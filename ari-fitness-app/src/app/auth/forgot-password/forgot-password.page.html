<ion-content>
    <div class="forgot-container">
        <div class="forgot-card">

            <div class="header-section">
                <ion-button fill="clear" class="back-btn" (click)="goToLogin()">
                    <ion-icon name="arrow-back-outline"></ion-icon>
                </ion-button>
                <h2>Recuperar Senha</h2>
                <p>Insira seu email para receber um link de recuperação.</p>
            </div>

            <div class="form-section" *ngIf="!submitted" [formGroup]="form">
                <ion-item lines="none">
                    <ion-label position="floating">Email</ion-label>
                    <ion-input type="email" formControlName="email" placeholder="seu@email.com"></ion-input>
                </ion-item>

                <ion-button expand="block" color="primary" class="send-button" [disabled]="form.invalid"
                    (click)="sendResetLink()">
                    Enviar Link
                </ion-button>
            </div>

            <div class="success-section" *ngIf="submitted">
                <div class="success-icon">
                    <ion-icon name="mail-unread-outline"></ion-icon>
                </div>
                <h3>Verifique seu email</h3>
                <p>Enviamos as instruções de recuperação para <strong>{{form.get('email')?.value}}</strong>.</p>

                <ion-button expand="block" fill="outline" class="back-to-login" (click)="goToLogin()">
                    Voltar para o Login
                </ion-button>
            </div>

        </div>
    </div>
</ion-content>
