<ion-content>
  <div class="login-container">
    <div class="login-card">

      <!-- Logo Section -->
      <div class="logo-section">
        <img src="assets/mvk-gym-manager-logo.png" alt="AriFitness Logo" class="logo-img">
        <h2>Bem-vindo de volta</h2>
        <p>Acesse sua conta para gerenciar sua unidade</p>
      </div>

      <!-- Form Section -->
      <div class="form-section" [formGroup]="form">
        <ion-list lines="none">
          <ion-item>
            <ion-label position="floating">CPF</ion-label>
            <ion-input type="text" formControlName="cpf" [maskito]="cpfMask" [maskitoElement]="maskPredicate">
            </ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="floating">Senha</ion-label>
            <ion-input type="password" formControlName="senha">
            </ion-input>
          </ion-item>
        </ion-list>

        <ion-button expand="block" color="primary" class="login-button" [disabled]="form.invalid" (click)="logar()">
          Entrar
        </ion-button>
      </div>

      <!-- Footer Links -->
      <div class="footer-links">
        <ion-button fill="clear" size="small" (click)="forgotPassword()">
          Esqueceu sua senha?
        </ion-button>

        <ion-button fill="clear" size="small" class="register-link" (click)="goToRegister()">
          Não tem uma conta? Cadastre-se agora
        </ion-button>
      </div>

    </div>
  </div>
</ion-content>
