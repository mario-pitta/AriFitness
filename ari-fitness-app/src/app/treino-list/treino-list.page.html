<ion-content>
    <ion-fab *ngIf="user.tipo_usuario === 3" slot="fixed" vertical="top" horizontal="end" [edge]="false">
        <ion-fab-button id="open-treino-modal" fill="outlined" color="success" (click)="addNewTreino()">
            <ion-icon name="add" size="large"></ion-icon>
        </ion-fab-button>
    </ion-fab>


    <ion-grid fixed>
        <ion-row class="ion-align-items-center">
            <ion-col size="12">
                <ion-searchbar placeholder="Pesquisar treinos..." [(ngModel)]="searchText" (keyup)="filterList()"
                    (ionClear)="filteredTreinos = treinos" class="custom-searchbar">
                </ion-searchbar>
            </ion-col>
        </ion-row>

        <div class="row g-4 px-2">
            <div *ngFor="let treino of filteredTreinos" class="col-12" [ngClass]="gridMode ? 'col-md-6 col-lg-4' : ''">
                <app-treino-list-item [treino]="treino" [enableSelect]="enableSelect" [user]="user"
                    [enableEdit]="enableEdit" (output)="listenItemEvents($event)">
                </app-treino-list-item>
            </div>
        </div>


        <ion-row *ngIf="filteredTreinos.length === 0" class="ion-justify-content-center ion-padding">
            <ion-text color="medium">Nenhum treino encontrado.</ion-text>
        </ion-row>
    </ion-grid>

    <ion-footer class="ion-no-border" *ngIf="filteredTreinos.length > 0 && !gridMode">
        <ion-toolbar class="ion-padding-horizontal">
            <ion-button expand="block" color="primary" shape="round" (click)="associateToUser()">
                <ion-icon name="checkmark-done-outline" slot="start"></ion-icon>
                VINCULAR TREINOS SELECIONADOS
            </ion-button>
        </ion-toolbar>
    </ion-footer>
</ion-content>

<ion-modal [isOpen]="openModal" (didDismiss)="openModal = false" class="modal-treino">
    <ng-template>
        <ion-header class="ion-border-bottom custom-border">
            <ion-toolbar>
                <ion-title class="fw-bold text-main">Editor de Treino</ion-title>
                <ion-buttons slot="end">
                    <ion-button (click)="closeModal()" class="text-soft-muted">
                        <ion-icon name="close" slot="icon-only"></ion-icon>
                    </ion-button>
                </ion-buttons>
            </ion-toolbar>
        </ion-header>

        <ion-content class="workout-editor-content">
            <div class=" py-4 ">
                <div class="row g-4">
                    <div class="col-12">
                        <section class="editor-section px-2 px-md-3">
                            <h6 class="section-title text-uppercase fw-bold mb-3 px-2">Informações Gerais</h6>
                            <app-workout-header></app-workout-header>
                        </section>
                    </div>

                    <div class="col-12">
                        <section class="editor-section px-2 px-md-3">
                            <h6 class="section-title text-uppercase fw-bold mb-3 px-2">Sessões & Programação</h6>
                            <app-session-tabs></app-session-tabs>
                            <div class="mt-3">
                                <app-exercise-table></app-exercise-table>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </ion-content>

        <ion-footer class="ion-no-border ion-border-top custom-border">
            <ion-toolbar class="ion-padding">
                <ion-button expand="block" shape="round" size="large" (click)="submitForm()"
                    [disabled]="loading || !(isWorkoutValid$ | async)" class="main-submit-btn">
                    <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
                    <span *ngIf="!loading" class="fw-bold">SALVAR E PUBLICAR TREINO</span>
                </ion-button>
            </ion-toolbar>
        </ion-footer>
    </ng-template>
</ion-modal>
