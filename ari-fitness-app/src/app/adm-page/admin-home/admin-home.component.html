<ion-split-pane when="md" contentId="main" class="pt-5 pb-0 mb-0 " [when]="!isMobile"
    (ionSplitPaneVisible)="onSplitPaneVisible($event)">
    <ion-menu contentId="main" side="start" menuId="first" #menu type="overlay" class="sidebar-menu">
        <ion-content class="sidebar-content " *ngIf="user">
            <!-- Header Integrado: Logo + Perfil -->
            <div class="sidebar-header">
                <div class="header-layout">
                    <ng-container *ngIf="user.empresa as empresa; else loadingLogo">
                        <div class="sidebar-brand-logo" *ngIf="empresa.logo_url">
                            <img [src]="empresa.logo_url" alt="Logo">
                        </div>
                        <div class="sidebar-brand-initial" *ngIf="!empresa.logo_url">
                            {{ (empresa.nome_fantasia || empresa.nome) | slice:0:1 }}
                        </div>
                    </ng-container>
                    <ng-template #loadingLogo>
                        <div class="sidebar-brand-initial" style="opacity: 0.3;">
                            <ion-spinner name="dots"></ion-spinner>
                        </div>
                    </ng-template>

                    <!-- <div class="sidebar-user-avatar">
                        <img *ngIf="user?.foto_url && user?.foto_url !== 'false'; else initials" [src]="user.foto_url"
                            alt="User">
                    </div> -->
                    <!-- </div> -->

                    <!-- <div class="sidebar-info-row"> -->
                    <div class="sidebar-user-name">
                        <p>{{ user?.nome }}</p>
                        <small>{{ user?.flagAdmin ? 'Administrador' : 'Instrutor' }}</small>
                    </div>
                    <!-- <div class="sidebar-company-name" *ngIf="empresa$ | async as empresa">
                        {{ empresa.nome_fantasia || empresa.nome }}
                    </div> -->
                </div>
            </div>

            <!-- Menu Groups -->
            <ion-list lines="none" class="sidebar-menu-list">
                <ng-container *ngFor="let group of menuGroups">
                    <div class="menu-group-label" *ngIf="group.label !== 'Aluno'">{{ group.label }}</div>

                    <ion-item *ngFor="let item of group.items" button [routerLink]="item.route"
                        routerLinkActive="menu-item-active" detail="false">
                        <ion-icon [name]="item.sidebarIcon" slot="start"></ion-icon>
                        <ion-label>{{ item.label }}</ion-label>
                    </ion-item>
                </ng-container>
            </ion-list>
        </ion-content>

        <ion-footer class="ion-no-border sidebar-footer">
            <ion-item button (click)="logout()" lines="none" class="logout-item">
                <ion-icon name="log-out-outline" slot="start" color="danger"></ion-icon>
                <ion-label color="danger">Sair do Sistema</ion-label>
            </ion-item>
            <div class="app-version">
                v{{ appVersion }} • MVK Gym
            </div>
        </ion-footer>
    </ion-menu>

    <div class="ion-page" id="main">
        <div class="fixed-breadcrumb-header ion-padding-horizontal ion-padding-top px-md-4">
            <ion-breadcrumbs [maxItems]="4">
                <ion-breadcrumb href="#/admin">
                    <ion-icon name="home-outline"></ion-icon>
                </ion-breadcrumb>
                <ion-breadcrumb *ngFor="let breadcrumb of breadcrumbs" [href]="'#'+breadcrumb.href">{{breadcrumb.title |
                    titlecase}}
                </ion-breadcrumb>
            </ion-breadcrumbs>
        </div>

        <div class="main-content-scroll  ">
            <router-outlet></router-outlet>
        </div>
    </div>
    <ng-template #initials>
        <span>{{ userInitials }}</span>
    </ng-template>
</ion-split-pane>
