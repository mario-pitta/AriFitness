<ion-card class="border-0 shadow-sm rounded-4 overflow-hidden workout-item-card mb-3 transition-all">
    <div class="card-status-indicator" [ngClass]="treino.nivel_dificuldade"></div>
    <ion-card-content class="p-4">
        <div class="d-flex align-items-start justify-content-between">
            <div class="flex-grow-1">
                <div class="d-flex align-items-center gap-2 mb-2">
                    <ion-checkbox *ngIf="enableSelect" [(ngModel)]="treino.checked" [id]="'treino_id_'+treino.id"
                        class="custom-checkbox" (ionChange)="output.emit({ action: 'check', value: treino })">
                    </ion-checkbox>
                    <span class="badge rounded-pill bg-primary-subtle text-primary border-0 px-3 fw-bold small">
                        {{ treino.nivel_dificuldade }}
                    </span>
                    <span *ngIf="treino.fl_publico"
                        class="badge rounded-pill bg-success-subtle text-success border-0 px-3 fw-bold small">
                        Público
                    </span>
                </div>

                <ion-card-title class="fw-black mb-2 fs-5 text-capitalize">{{ treino.nome }}</ion-card-title>

                <div class="d-flex flex-wrap gap-3 mt-3">
                    <div class="d-flex align-items-center gap-2 text-soft-muted small">
                        <ion-icon name="body-outline" class="text-primary"></ion-icon>
                        <span class="fw-semibold">{{ treino.parte_do_corpo?.nome || '-' }}</span>
                    </div>
                    <div class="d-flex align-items-center gap-2 text-soft-muted small">
                        <ion-icon name="fitness-outline" class="text-primary"></ion-icon>
                        <span class="fw-semibold">{{ treino.grupo_muscular?.nome || '-' }}</span>
                    </div>
                </div>
            </div>

            <div class="d-flex flex-column gap-2 ms-3">
                <button *ngIf="user.tipo_usuario == 3 || (enableEdit && !treino.fl_publico)"
                    (click)="output.emit({ action: 'edit', value: treino })"
                    class="btn btn-action-icon rounded-circle p-2 shadow-sm d-flex align-items-center justify-content-center custom-border"
                    style="width: 40px; height: 40px;">
                    <ion-icon name="create-outline" class="fs-5 text-soft-muted"></ion-icon>
                </button>
                <button *ngIf="user.tipo_usuario == 3" (click)="deleteTreino(treino.id)"
                    class="btn btn-action-icon rounded-circle p-2 shadow-sm d-flex align-items-center justify-content-center custom-border"
                    style="width: 40px; height: 40px;">
                    <ion-icon name="trash-outline" class="fs-5 text-soft-muted"></ion-icon>
                </button>
            </div>
        </div>
    </ion-card-content>
</ion-card>
