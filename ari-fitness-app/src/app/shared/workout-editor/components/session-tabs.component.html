<div class="session-nav d-flex align-items-center gap-3 overflow-auto no-scrollbar pb-3">
    <div *ngFor="let sessao of sessoes; let i = index" (click)="selectSession(sessao)"
        class="session-pill d-flex align-items-center gap-3 px-4 py-2 rounded-4 cursor-pointer transition-all"
        [ngClass]="activeSession?.ordem === sessao.ordem ? 'active shadow-lg' : 'bg-soft text-soft-muted shadow-sm'">

        <div class="d-flex flex-column">
            <span class="pill-label">SESSÃO</span>
            <span class="pill-name">{{sessao.nome}}</span>
        </div>

        <div class="d-flex flex-column align-items-end">
            <span class="badge rounded-pill mb-1"
                [ngClass]="activeSession?.ordem === sessao.ordem ? 'bg-white text-primary' : 'bg-primary text-white'">
                {{sessao.exercicios?.length || 0}} ex.
            </span>
            <ion-icon name="ellipsis-vertical" class="op-5 hover-op-10"
                (click)="optionsSession(sessao, $event)"></ion-icon>
        </div>
    </div>

    <button (click)="addSession()"
        class="add-session-card d-flex flex-column align-items-center justify-content-center rounded-4 border-0 transition-all">
        <ion-icon name="add-outline" class="fs-4 mb-1"></ion-icon>
        <span class="small fw-bold">NOVA</span>
    </button>
</div>
