<ion-header class="ion-no-border">
    <ion-toolbar color="primary">
        <ion-title class="fw-bold">Selecionar Exercício</ion-title>
        <ion-buttons slot="end">
            <ion-button (click)="dismiss()">
                <ion-icon name="close"></ion-icon>
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
    <ion-toolbar color="primary" class="pb-3 px-2">
        <ion-searchbar placeholder="Buscar exercício por nome..." [(ngModel)]="searchText"
            (ionInput)="filterExercises()" class="custom-searchbar-modal shadow-lg">
        </ion-searchbar>
    </ion-toolbar>
</ion-header>

<ion-content class="bg-light">
    <div class="container py-2">
        <div class="list-group list-group-flush rounded-4 shadow-sm bg-white mt-3 position-relative">
            <div *ngFor="let ex of filteredExercises" (click)="selectExercise(ex)"
                class="list-group-item list-group-item-action d-flex align-items-center gap-3 p-3 border-light-subtle cursor-pointer">

                <div class="thumb-trigger border rounded-3 overflow-visible"
                    style="width: 48px; height: 48px; position: relative; z-index: 5;"
                    (mouseenter)="startSlideshow($event, ex)" (mouseleave)="stopSlideshow(ex)"
                    (touchstart)="handleTouchStart($event, ex)" (touchend)="handleTouchEnd()"
                    (touchmove)="handleTouchEnd()">
                    <img [src]="ex.img_url || 'assets/images/placeholder-exercise.png'" class="exercise-thumb rounded-3"
                        alt="exercício" style="width: 100%; height: 100%; object-fit: cover;">
                </div>

                <div class="flex-grow-1">
                    <h6 class="mb-0 fw-bold text-dark">{{ex.nome}}</h6>
                    <div class="d-flex gap-2 mt-1">
                        <span class="badge bg-light text-muted small border">{{ex.grupo_muscular?.nome ||
                            'Geral'}}</span>
                        <span class="badge bg-light text-muted small border">{{ex.equipamento?.nome || 'Livre'}}</span>
                    </div>
                </div>

                <ion-icon name="chevron-forward-outline" class="text-muted op-5"></ion-icon>
            </div>
        </div>

        <div *ngIf="filteredExercises.length === 0" class="text-center py-5 text-muted">
            <ion-icon name="search-outline" size="large" class="op-2 mb-2"></ion-icon>
            <p>Nenhum exercício encontrado para "{{searchText}}"</p>
        </div>
    </div>
</ion-content>

<!-- Ghost Zoom Overlay -->
<div *ngIf="hoveredEx" [ngStyle]="hoveredStyles" class="zoom-ghost-overlay">
    <img [src]="hoveredEx.img_url || 'assets/images/placeholder-exercise.png'"
        style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px; border: 2px solid white; box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
</div>

<style>
    .custom-searchbar-modal {
        --background: #ffffff;
        --border-radius: 12px;
        --placeholder-color: #94a3b8;
        --icon-color: var(--ion-color-primary);
        padding: 0 8px;
    }

    .thumb-trigger {
        background-color: var(--ion-color-step-100);
        flex-shrink: 0;
    }

    .exercise-thumb {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .zoom-ghost-overlay {
        pointer-events: none;
        transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        transform: scale(8);
    }

    .cursor-pointer {
        cursor: pointer;
    }

    .op-2 {
        opacity: 0.2;
    }

    .op-5 {
        opacity: 0.5;
    }
</style>
